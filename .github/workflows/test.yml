name: Tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install test dependencies only (no Discord voice libs needed in CI)
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run tests
        env:
          # Provide a dummy token so bot.config doesn't fail at import
          DISCORD_TOKEN: ci-dummy-token
        run: |
          pytest \
            --cov=bot \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage XML (for diff tools)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

      # Fail the build if coverage of *new* lines drops below 80 %.
      # We use the --fail-under flag on the full report for now; per-diff
      # enforcement can be added via a coverage diff tool when needed.
      - name: Enforce minimum coverage
        run: |
          python -m coverage report --fail-under=80 || {
            echo "::error::Coverage is below 80%. Add tests for new code."
            exit 1
          }
